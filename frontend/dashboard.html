<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Vigia BR</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="sidebar">

<h2>Vigia BR</h2>

<a href="dashboard.html">📊 Dashboard</a>
<a href="produtos-risco.html">⚠️ Produtos em risco</a>
<a href="promocoes.html">💰 Promoções</a>
<a href="ranking.html">📉 Ranking</a>
<a href="registrar-validade.html">➕ Registrar lote</a>

<a href="#" onclick="logout()">🚪 Sair</a>

</div>


<div class="main">

<h1>Dashboard</h1>

<p id="usuarioLogado" style="margin-bottom:20px;font-weight:bold;"></p>

<div class="cards">

<div class="card">
<h3>Produtos cadastrados</h3>
<p id="totalProdutos">0</p>
</div>

<div class="card">
<h3>Produtos em risco</h3>
<p id="produtosRisco">0</p>
</div>

<div class="card">
<h3>Funcionário líder</h3>
<p id="liderRanking">-</p>
</div>

<div class="card">
<h3>💰 Perda evitada</h3>
<p id="perdaEvitada">R$ 0</p>
</div>

</div>


<h2>⚠ Produtos vencendo em breve</h2>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Quantidade</th>
<th>Validade</th>
<th>Dias restantes</th>
<th>Funcionário</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaRisco">
</tbody>

</table>

</div>


<script>

// ============================
// CONFIG
// ============================

const API_URL = "https://vigia-br.onrender.com"


// ============================
// LOGIN
// ============================

const funcionario = localStorage.getItem("funcionario")

if(!funcionario){
window.location.href = "login.html"
}

document.getElementById("usuarioLogado").innerText =
"Funcionário logado: " + funcionario


function logout(){
localStorage.removeItem("funcionario")
window.location.href = "login.html"
}



// ============================
// EXCLUIR PRODUTO
// ============================

async function excluirProduto(id){

const confirmar = confirm("Tem certeza que deseja excluir este produto?")

if(!confirmar) return

try{

await fetch(API_URL + "/produtos/" + id,{
method:"DELETE"
})

alert("Produto excluído com sucesso")

carregarDashboard()

}catch(erro){

console.error("Erro ao excluir produto:", erro)

}

}



// ============================
// CARREGAR DASHBOARD
// ============================

async function carregarDashboard(){

try{

// ============================
// TOTAL PRODUTOS
// ============================

const respostaProdutos = await fetch(API_URL + "/produtos")
const produtos = await respostaProdutos.json()

document.getElementById("totalProdutos").innerText = produtos.length



// ============================
// PRODUTOS EM RISCO
// ============================

const respostaRisco = await fetch(API_URL + "/produtos-risco")
const risco = await respostaRisco.json()

document.getElementById("produtosRisco").innerText = risco.length

const tabela = document.getElementById("tabelaRisco")

tabela.innerHTML = ""

risco.forEach(produto => {

tabela.innerHTML += `
<tr>
<td>${produto.produto}</td>
<td>${produto.quantidade}</td>
<td>${produto.validade}</td>
<td>${produto.dias_restantes}</td>
<td>${produto.funcionario}</td>

<td>
<button class="btn-excluir" onclick="excluirProduto(${produto.id})">
🗑 Excluir
</button>
</td>

</tr>
`

})



// ============================
// RANKING (opcional)
// ============================

try{

const respostaRanking = await fetch(API_URL + "/ranking")
const ranking = await respostaRanking.json()

if(ranking.length > 0){
document.getElementById("liderRanking").innerText = ranking[0].funcionario
}

}catch(e){

console.log("Ranking ainda não disponível")

}



// ============================
// IMPACTO FINANCEIRO (opcional)
// ============================

try{

const respostaFinanceiro = await fetch(API_URL + "/impacto-financeiro")
const financeiro = await respostaFinanceiro.json()

if(financeiro.perda_evitada){
document.getElementById("perdaEvitada").innerText =
"R$ " + financeiro.perda_evitada
}

}catch(e){

console.log("Impacto financeiro ainda não disponível")

}


}catch(erro){

console.error("Erro ao carregar dashboard:", erro)

}

}

carregarDashboard()

</script>

</body>
</html>

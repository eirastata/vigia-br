<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Promoções - Vigia BR</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="sidebar">

<h2>Vigia BR</h2>

<a href="dashboard.html">📊 Dashboard</a>
<a href="produtos-risco.html">⚠️ Produtos em risco</a>
<a href="promocoes.html">💰 Promoções</a>
<a href="ranking.html">📉 Ranking</a>
<a href="registrar-validade.html">➕ Registrar lote</a>

<a href="#" onclick="logout()">🚪 Sair</a>

</div>


<div class="main">

<h1>💰 Sugestões de promoção</h1>

<p id="usuarioLogado" style="margin-bottom:20px;font-weight:bold;"></p>

<p>Produtos que vencem em até 7 dias</p>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Quantidade</th>
<th>Validade</th>
<th>Dias restantes</th>
<th>Desconto sugerido</th>
</tr>
</thead>

<tbody id="tabelaPromocoes">

</tbody>

</table>

</div>


<script>

// URL da API em produção
const API_URL = "https://vigia-br.onrender.com"


// proteção de login
const funcionario = localStorage.getItem("funcionario")

if(!funcionario){
window.location.href = "login.html"
}

// mostra usuário logado
document.getElementById("usuarioLogado").innerText =
"Funcionário logado: " + funcionario


function logout(){

localStorage.removeItem("funcionario")

window.location.href = "login.html"

}


async function carregarPromocoes(){

try{

const resposta = await fetch(API_URL + "/produtos-risco")

const produtos = await resposta.json()

const tabela = document.getElementById("tabelaPromocoes")

tabela.innerHTML = ""

produtos.forEach(produto => {

if(produto.dias_restantes <= 7){

tabela.innerHTML += `
<tr>
<td>${produto.produto}</td>
<td>${produto.quantidade}</td>
<td>${produto.validade}</td>
<td>${produto.dias_restantes}</td>
<td class="desconto">🔥 ${produto.desconto_sugerido}%</td>
</tr>
`

}

})

}catch(erro){

console.error("Erro ao carregar promoções:", erro)

}

}

carregarPromocoes()

</script>

</body>
</html>
